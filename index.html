<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Doing Amazingly ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --blush: #f2c4ce;
    --rose: #e8a0b0;
    --cream: #fdf6f0;
    --soft-pink: #fde8ee;
    --mauve: #c9848e;
    --dusty-rose: #d4909a;
    --lavender: #e8d5e8;
    --sage: #d4e8d4;
    --gold: #d4a853;
    --warm-white: #fff9f5;
    --text-dark: #5a3a3a;
    --text-mid: #8b5a5a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
    position: relative;
    cursor: default;
  }

  /* Soft background gradient */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, #fde8ee88 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, #e8d5e888 0%, transparent 50%),
      radial-gradient(ellipse at 60% 10%, #f2c4ce44 0%, transparent 40%),
      var(--cream);
    z-index: 0;
  }

  /* Floating decorative elements */
  .deco-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    font-size: 1.4rem;
    opacity: 0.18;
    animation: floatPetal linear infinite;
  }

  @keyframes floatPetal {
    0% { transform: translateY(-60px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.18; }
    90% { opacity: 0.15; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* Bows SVG decorations */
  .bow {
    position: absolute;
    width: 60px;
    opacity: 0.35;
    animation: bowFloat 4s ease-in-out infinite;
  }
  .bow:nth-child(2) { animation-delay: -1.5s; }
  .bow:nth-child(3) { animation-delay: -3s; }

  @keyframes bowFloat {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-12px) rotate(5deg); }
  }

  /* Main container */
  .app {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    gap: 30px;
  }

  /* Header */
  .header {
    text-align: center;
    animation: fadeDown 1s ease both;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-style: italic;
    color: var(--text-dark);
    letter-spacing: 0.02em;
    line-height: 1.2;
  }

  .header p {
    font-size: 1.1rem;
    color: var(--mauve);
    font-style: italic;
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .bow-header {
    font-size: 2rem;
    display: inline-block;
    animation: bowFloat 3s ease-in-out infinite;
  }

  /* Flashcard */
  .card-container {
    perspective: 1200px;
    width: min(520px, 92vw);
    animation: fadeUp 1s 0.3s ease both;
  }

  .flashcard {
    width: 100%;
    aspect-ratio: 3/2;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
  }

  .flashcard.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 35px 30px;
    text-align: center;
    box-shadow: 
      0 8px 40px rgba(200, 120, 140, 0.18),
      0 2px 10px rgba(200, 120, 140, 0.1),
      inset 0 1px 0 rgba(255,255,255,0.8);
  }

  .card-front {
    background: linear-gradient(145deg, #fff9f5, #fde8ee, #f9e0eb);
    border: 2px solid rgba(242, 196, 206, 0.5);
  }

  .card-back {
    background: linear-gradient(145deg, #fdf0f5, #f5e8f5, #ede8f5);
    border: 2px solid rgba(200, 180, 220, 0.5);
    transform: rotateY(180deg);
  }

  /* Bow corners */
  .card-face::before,
  .card-face::after {
    content: '🎀';
    position: absolute;
    font-size: 1.4rem;
    opacity: 0.7;
  }
  .card-face::before { top: 14px; left: 18px; transform: rotate(-15deg); }
  .card-face::after { bottom: 14px; right: 18px; transform: rotate(15deg); transform: scaleX(-1) rotate(-15deg); }

  .character {
    font-size: clamp(3rem, 8vw, 5rem);
    margin-bottom: 16px;
    animation: charBounce 3s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(200,120,140,0.2));
    line-height: 1;
  }

  @keyframes charBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-8px) scale(1.05); }
  }

  .affirmation-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 3vw, 1.55rem);
    font-style: italic;
    color: var(--text-dark);
    line-height: 1.55;
    letter-spacing: 0.01em;
  }

  .card-tag {
    margin-top: 14px;
    font-size: 0.85rem;
    color: var(--mauve);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  .tap-hint {
    font-size: 0.8rem;
    color: var(--dusty-rose);
    opacity: 0.6;
    margin-top: 10px;
    letter-spacing: 0.08em;
    font-style: italic;
  }

  /* Buttons */
  .controls {
    display: flex;
    gap: 16px;
    align-items: center;
    animation: fadeUp 1s 0.5s ease both;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1rem;
    padding: 12px 28px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    letter-spacing: 0.04em;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.3);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover::after { opacity: 1; }
  .btn:hover { transform: translateY(-3px) scale(1.04); }
  .btn:active { transform: scale(0.97); }

  .btn-main {
    background: linear-gradient(135deg, var(--rose), var(--mauve));
    color: white;
    box-shadow: 0 4px 20px rgba(200,120,140,0.35);
  }

  .btn-soft {
    background: linear-gradient(135deg, #fde8ee, var(--lavender));
    color: var(--text-dark);
    box-shadow: 0 4px 16px rgba(200,120,140,0.15);
    border: 1.5px solid rgba(200,150,170,0.3);
  }

  /* Counter */
  .counter {
    text-align: center;
    animation: fadeUp 1s 0.7s ease both;
  }

  .counter p {
    font-size: 0.9rem;
    color: var(--mauve);
    font-style: italic;
    letter-spacing: 0.05em;
  }

  .progress-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
    flex-wrap: wrap;
    max-width: 300px;
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--blush);
    transition: all 0.3s ease;
  }

  .dot.active {
    background: var(--mauve);
    transform: scale(1.3);
  }

  /* Mood selector */
  .mood-section {
    text-align: center;
    animation: fadeUp 1s 0.9s ease both;
  }

  .mood-label {
    font-size: 0.95rem;
    color: var(--mauve);
    font-style: italic;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }

  .mood-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .mood-btn {
    background: rgba(255,255,255,0.7);
    border: 1.5px solid rgba(200,150,170,0.3);
    border-radius: 40px;
    padding: 8px 18px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(4px);
  }

  .mood-btn:hover,
  .mood-btn.selected {
    background: linear-gradient(135deg, #fde8ee, var(--lavender));
    border-color: var(--rose);
    color: var(--text-dark);
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(200,120,140,0.2);
  }

  /* Confetti burst on card change */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: confettiFall 2s ease-out forwards;
    opacity: 0;
  }

  @keyframes confettiFall {
    0% { transform: translateY(50vh) scale(0); opacity: 1; }
    60% { opacity: 1; }
    100% { transform: translateY(-20vh) scale(1) rotate(720deg); opacity: 0; }
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Sparkle pop on card */
  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 1rem;
    animation: sparklePop 1s ease-out forwards;
    z-index: 20;
  }

  @keyframes sparklePop {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    60% { transform: scale(1.4) rotate(30deg); opacity: 1; }
    100% { transform: scale(0) rotate(60deg); opacity: 0; }
  }

  /* Scrolling ticker at bottom */
  .ticker-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(90deg, var(--blush), var(--lavender), var(--blush));
    padding: 8px 0;
    overflow: hidden;
    z-index: 50;
  }

  .ticker {
    display: flex;
    gap: 60px;
    white-space: nowrap;
    animation: tickerScroll 30s linear infinite;
    width: max-content;
  }

  .ticker span {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--text-dark);
    letter-spacing: 0.05em;
    opacity: 0.8;
  }

  @keyframes tickerScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* Small lace border on cards */
  .lace {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--rose);
    opacity: 0.5;
    padding-bottom: 8px;
  }

  /* Heart ribbon */
  .ribbon {
    position: absolute;
    top: -1px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.75rem;
    color: var(--mauve);
    opacity: 0.6;
    letter-spacing: 0.15em;
  }
</style>
</head>
<body>

<div class="deco-bg" id="decoBg"></div>
<div class="confetti-container" id="confetti"></div>

<div class="app">
  <div class="header">
    <div class="bow-header">🎀</div>
    <h1>your little safe place</h1>
    <p>~ softer than yesterday, brighter than tomorrow ~</p>
  </div>

  <div class="mood-section">
    <p class="mood-label">how are you feeling right now, love? 🌸</p>
    <div class="mood-btns">
      <button class="mood-btn selected" onclick="setMood('all')" id="mood-all">🌈 all cards</button>
      <button class="mood-btn" onclick="setMood('missed')" id="mood-missed">🐾 missed a day</button>
      <button class="mood-btn" onclick="setMood('silly')" id="mood-silly">🫧 need a giggle</button>
      <button class="mood-btn" onclick="setMood('gentle')" id="mood-gentle">🕊️ extra gentle</button>
    </div>
  </div>

  <div class="card-container">
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="card-face card-front" id="cardFront">
        <div class="ribbon">✦ &nbsp; for you &nbsp; ✦</div>
        <div class="character" id="charFront">🐶</div>
        <p class="affirmation-text" id="affirmText">Loading your affirmation...</p>
        <p class="tap-hint">tap to flip ✨</p>
        <div class="lace">❧ ✦ ❧</div>
      </div>
      <div class="card-face card-back" id="cardBack">
        <div class="ribbon">✦ &nbsp; remember &nbsp; ✦</div>
        <div class="character" id="charBack">🤖</div>
        <p class="affirmation-text" id="backText">You are so loved.</p>
        <p class="card-tag" id="backTag">~ baymax says so ~</p>
        <div class="lace">❧ ✦ ❧</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-soft" onclick="prevCard()">← previous</button>
    <button class="btn btn-main" onclick="nextCard()">next darling →</button>
  </div>

  <div class="counter">
    <p id="counterText">card 1 of 20 ✦</p>
    <div class="progress-dots" id="dots"></div>
  </div>
</div>

<!-- Scrolling ticker -->
<div class="ticker-wrap">
  <div class="ticker" id="ticker"></div>
</div>

<script>
const cards = [
  // Missed a day / rest
  {
    mood: 'missed',
    char: '🐶',
    text: "Snoopy takes naps on his doghouse roof constantly and still manages to write the Great American Novel. Your rest day is VALID.",
    backChar: '🤖',
    backText: "On a scale of one to ten, you are a ten. Baymax has calculated this. It is non-negotiable.",
    backTag: "~ baymax's official diagnosis ~"
  },
  {
    mood: 'missed',
    char: '🐾',
    text: "Charlie Brown tried to kick that football approximately 100 times. He kept trying. So will you. But today? Today you rest.",
    backChar: '🤗',
    backText: "Missing a day doesn't undo all the days you showed up. Your streak is your whole life, not just this week.",
    backTag: "~ gently noted by snoopy ~"
  },
  {
    mood: 'missed',
    char: '🤖',
    text: "Baymax would like to inform you that rest is a biological requirement, not a personality flaw. Your body sent a request. You approved it. Correct.",
    backChar: '🐶',
    backText: "Snoopy doesn't apologise for sleeping. Neither should you.",
    backTag: "~ officially snoopy-approved ~"
  },
  {
    mood: 'missed',
    char: '🌸',
    text: "The code will be there tomorrow. But this moment of stillness? This is also you building something — your resilience.",
    backChar: '🤖',
    backText: "I am satisfied with your care of yourself. Baymax approves.",
    backTag: "~ baymax nods softly ~"
  },
  {
    mood: 'missed',
    char: '🐶',
    text: "Even the world's most famous beagle had days he just stared at the clouds. That's not giving up — that's wisdom.",
    backChar: '💗',
    backText: "You didn't fail today. You paused. Pauses are punctuation, not the end of the story.",
    backTag: "~ with the softest love ~"
  },

  // Silly / funny
  {
    mood: 'silly',
    char: '🐶',
    text: "Snoopy once danced so hard he became a legend. You're also a legend. Different dance, same energy.",
    backChar: '🤖',
    backText: "Error 404: Your flaws not found. Baymax has run a full diagnostic. You are delightfully intact.",
    backTag: "~ baymax, very seriously ~"
  },
  {
    mood: 'silly',
    char: '🤖',
    text: "Baymax inflated to full size just to give you a hug. He says it is free. He says you deserve it. He is very large. Very fluffy. All yours.",
    backChar: '🐶',
    backText: "Snoopy is doing the happy dance right now. It's specifically for you. You're welcome.",
    backTag: "~ *jazz paws* ~"
  },
  {
    mood: 'silly',
    char: '🌺',
    text: "Your brain is literally doing parkour every single day. The fact that you're functioning is already impressive. Add a gold star.",
    backChar: '🤖',
    backText: "Would you like a lollipop? Baymax always offers one after. You have been very brave.",
    backTag: "~ baymax rummages through his arm ~"
  },
  {
    mood: 'silly',
    char: '🐶',
    text: "Snoopy once sent his novel to 26 publishers, got rejected by all 26, and still went to dance on his rooftop. That's slay. That's you.",
    backChar: '🫧',
    backText: "You are the main character. The plot is just getting interesting.",
    backTag: "~ narrator voice ~"
  },
  {
    mood: 'silly',
    char: '🤖',
    text: "Baymax note: You have been perceived as 'a lot' before. This is a feature. Not a bug. You are running special software.",
    backChar: '🐾',
    backText: "Snoopy doesn't explain himself to anyone. Inspiration.",
    backTag: "~ iconic energy ~"
  },

  // Gentle / soft
  {
    mood: 'gentle',
    char: '🌷',
    text: "You don't have to earn rest. You don't have to earn kindness. You don't have to earn your place here. You simply have it.",
    backChar: '🤖',
    backText: "Your feelings are valid. All of them. Even the weird ones at 2am. Especially those.",
    backTag: "~ baymax, with warmth ~"
  },
  {
    mood: 'gentle',
    char: '🐶',
    text: "Snoopy lies in the grass and looks at stars and that is enough for him. Existing gently is enough. You are doing it right.",
    backChar: '🌸',
    backText: "You carry a lot. More than anyone sees. And you're still here, still soft. That's extraordinary.",
    backTag: "~ this is your reminder ~"
  },
  {
    mood: 'gentle',
    char: '🤖',
    text: "Baymax's hug detection is active. He has determined that you could use one. He is soft. He is here. He will not let go until you feel better.",
    backChar: '💗',
    backText: "Some days the bravest thing is just being gentle with yourself. Today counts.",
    backTag: "~ tenderly ~"
  },
  {
    mood: 'gentle',
    char: '🌸',
    text: "Your worth is not measured in productivity. Not in streaks. Not in how fast you learn. You are worthy in every quiet, tired, beautiful moment.",
    backChar: '🐶',
    backText: "Snoopy never once questioned his worth. Study him. Become him.",
    backTag: "~ aspirational beagle ~"
  },
  {
    mood: 'gentle',
    char: '💗',
    text: "It is okay to be exactly where you are right now. Not ahead. Not behind. Right here. This is a valid coordinate on the map of your life.",
    backChar: '🤖',
    backText: "Healthcare is my primary function. This includes heart-care. You qualify.",
    backTag: "~ baymax, professionally ~"
  },

  // Mixed / general
  {
    mood: 'all',
    char: '🐶',
    text: "Snoopy once flew his doghouse across France in his imagination. You do big things in your mind too. That's called being brilliant.",
    backChar: '🤖',
    backText: "I have scanned you. You are not broken. You are becoming.",
    backTag: "~ baymax's final report ~"
  },
  {
    mood: 'all',
    char: '🤖',
    text: "Baymax would like to remind you: you helped him find his purpose. You don't have to have it all figured out. Your presence changes things.",
    backChar: '🌷',
    backText: "The world is genuinely better because you are in it. This is measurable.",
    backTag: "~ fact, not opinion ~"
  },
  {
    mood: 'all',
    char: '🎀',
    text: "You are not too much. You are not too little. You are the exact specific amount of you that this world needed.",
    backChar: '🐶',
    backText: "Snoopy says good grief — and then keeps going. So can you.",
    backTag: "~ good grief means good heart ~"
  },
  {
    mood: 'all',
    char: '🌺',
    text: "Messing up is how you learn, not proof that you can't. Baymax learned to fly by crashing first. Now look at him.",
    backChar: '🤖',
    backText: "We're a team. You are not alone in this. We'll figure it out together.",
    backTag: "~ baymax, loyally ~"
  },
  {
    mood: 'all',
    char: '🐾',
    text: "Tomorrow you will begin again. And the beginning is always a gift. But tonight, you can just be. Snoopy is here. Baymax is here. So are we.",
    backChar: '💗',
    backText: "You are so very loved. Just as you are. Right now. In this moment.",
    backTag: "~ always and always ~"
  }
];

let currentMood = 'all';
let filteredCards = [...cards];
let currentIndex = 0;
let isFlipped = false;

function setMood(mood) {
  currentMood = mood;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('mood-' + mood)?.classList.add('selected');
  
  if (mood === 'all') {
    filteredCards = [...cards];
  } else {
    filteredCards = cards.filter(c => c.mood === mood || c.mood === 'all');
    if (filteredCards.length === 0) filteredCards = [...cards];
  }
  
  currentIndex = 0;
  isFlipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  updateCard(true);
}

function updateCard(animate) {
  const card = filteredCards[currentIndex];
  const front = document.getElementById('cardFront');
  const back = document.getElementById('cardBack');

  if (animate) {
    front.style.opacity = '0';
    back.style.opacity = '0';
    setTimeout(() => {
      applyCard(card);
      front.style.transition = 'opacity 0.4s';
      back.style.transition = 'opacity 0.4s';
      front.style.opacity = '1';
      back.style.opacity = '1';
    }, 200);
  } else {
    applyCard(card);
  }

  updateDots();
  document.getElementById('counterText').textContent = `card ${currentIndex + 1} of ${filteredCards.length} ✦`;
}

function applyCard(card) {
  document.getElementById('charFront').textContent = card.char;
  document.getElementById('affirmText').textContent = card.text;
  document.getElementById('charBack').textContent = card.backChar;
  document.getElementById('backText').textContent = card.backText;
  document.getElementById('backTag').textContent = card.backTag;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
  spawnSparkles();
}

function nextCard() {
  currentIndex = (currentIndex + 1) % filteredCards.length;
  isFlipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  updateCard(true);
  burst();
}

function prevCard() {
  currentIndex = (currentIndex - 1 + filteredCards.length) % filteredCards.length;
  isFlipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  updateCard(true);
}

function updateDots() {
  const container = document.getElementById('dots');
  container.innerHTML = '';
  filteredCards.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentIndex ? ' active' : '');
    container.appendChild(d);
  });
}

function spawnSparkles() {
  const card = document.getElementById('flashcard');
  const rect = card.getBoundingClientRect();
  const emojis = ['✨', '🌸', '💗', '🎀', '⭐', '🌷'];
  for (let i = 0; i < 6; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = (rect.left + Math.random() * rect.width) + 'px';
    s.style.top = (rect.top + Math.random() * rect.height) + 'px';
    s.style.animationDelay = (Math.random() * 0.3) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1200);
  }
}

function burst() {
  const colors = ['#f2c4ce', '#e8d5e8', '#d4a853', '#e8a0b0', '#c9848e', '#fde8ee'];
  const container = document.getElementById('confetti');
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = (20 + Math.random() * 60) + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.animationDelay = (Math.random() * 0.4) + 's';
    p.style.animationDuration = (1.5 + Math.random()) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

// Floating petals background
function createPetals() {
  const bg = document.getElementById('decoBg');
  const emojis = ['🌸', '🌷', '✿', '❀', '🌺', '💮'];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (12 + Math.random() * 15) + 's';
    p.style.animationDelay = -(Math.random() * 20) + 's';
    p.style.fontSize = (0.8 + Math.random() * 1.4) + 'rem';
    bg.appendChild(p);
  }
}

// Ticker
function buildTicker() {
  const messages = [
    '🎀 you are enough',
    '🐶 snoopy believes in you',
    '🤖 baymax says you are wonderful',
    '🌸 rest is not giving up',
    '✨ your softness is your strength',
    '💗 missing days doesn\'t erase your progress',
    '🎀 you are loved exactly as you are',
    '🌷 tenderness is a superpower',
    '🐾 you\'re still here and that matters',
    '🤖 i am satisfied with your care',
    '🌸 you deserve your own kindness too',
    '✦ small steps are still steps',
  ];
  
  const ticker = document.getElementById('ticker');
  const full = [...messages, ...messages]; // duplicate for seamless loop
  full.forEach(m => {
    const s = document.createElement('span');
    s.textContent = m;
    ticker.appendChild(s);
  });
}

// Init
createPetals();
buildTicker();
updateCard(false);
</script>
</body>
</html>
